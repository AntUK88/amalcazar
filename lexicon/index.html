<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Lexicon — A. M. Alcazar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/theme.css">
  <script>(function(){if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #fff7ed; --ink: #1a1814; --muted: #8a8478; --rule: #d8d2c8; }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
    }

    body { display: flex; flex-direction: column; }

    /* ── Header ── */
    header {
      padding: 0 3rem;
      height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }

    .site-name {
      font-family: 'EB Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 1rem;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-decoration: none;
    }

    nav { display: flex; gap: 2rem; align-items: center; }
    nav a {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--ink); }
    nav a.active { color: var(--ink); }

    .nav-item { position: relative; display: flex; align-items: center; }
    .nav-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #fff7ed;
      border: 1px solid var(--rule);
      min-width: 160px;
      z-index: 200;
      padding: 0.75rem 0 0.5rem;
    }
    .nav-dropdown a {
      display: block;
      padding: 0.45rem 1rem;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .nav-dropdown a:hover { color: var(--ink); }
    .nav-item:hover .nav-dropdown { display: block; }

    /* ── Footer ── */
    footer {
      padding: 1rem 3rem;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    footer span, footer a {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      text-decoration: none;
    }
    footer a:hover { color: var(--ink); }

    /* ── Main layout ── */
    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    /* ── Page title & mode toggle ── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 2.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--rule);
    }

    .page-title {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.06em;
    }

    .mode-toggle {
      display: flex;
      gap: 1.5rem;
    }

    .mode-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0;
      transition: color 0.2s;
    }
    .mode-btn:hover { color: var(--ink); }
    .mode-btn.active { color: var(--ink); }

    /* ── Add word form ── */
    .add-form {
      display: flex;
      gap: 0;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--ink);
    }

    .add-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1.05rem;
      color: var(--ink);
      padding: 0.5rem 0;
      letter-spacing: 0.01em;
    }
    .add-input::placeholder { color: var(--muted); font-style: italic; }

    .add-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.5rem 0 0.5rem 1rem;
      transition: color 0.2s;
      white-space: nowrap;
    }
    .add-btn:hover { color: var(--ink); }
    .add-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Status message ── */
    .status {
      font-size: 0.78rem;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 1.5rem;
      min-height: 1.2em;
    }

    /* ── Word list ── */
    .word-list { list-style: none; }

    .word-entry {
      padding: 1.25rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .word-entry:first-child { border-top: 1px solid var(--rule); }

    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.3rem;
    }

    .entry-word {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .entry-pos {
      font-size: 0.82rem;
      font-style: italic;
      color: var(--muted);
      margin-left: 0.6rem;
      font-weight: 400;
    }

    .entry-actions {
      display: flex;
      gap: 1rem;
    }

    .entry-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.68rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0;
      transition: color 0.2s;
    }
    .entry-btn:hover { color: var(--ink); }
    .entry-btn.delete-btn:hover { color: #8b2020; }

    .entry-phonetic {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
      font-style: italic;
    }

    .entry-def {
      font-size: 1rem;
      line-height: 1.65;
      color: var(--ink);
    }

    /* ── Edit state ── */
    .edit-area {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid var(--rule);
      outline: none;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1rem;
      line-height: 1.65;
      color: var(--ink);
      resize: none;
      padding: 0.25rem 0;
      margin-top: 0.25rem;
    }
    .edit-area:focus { border-bottom-color: var(--ink); }

    .edit-controls {
      display: flex;
      gap: 1rem;
      margin-top: 0.6rem;
    }

    /* ── Empty state ── */
    .empty {
      padding: 3rem 0;
      font-size: 0.88rem;
      font-style: italic;
      color: var(--muted);
      text-align: center;
    }

    /* ── Quiz mode ── */
    .quiz-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 1rem;
    }

    .quiz-meta {
      font-size: 0.72rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* Card flip */
    .card-scene {
      width: 100%;
      max-width: 480px;
      height: 240px;
      perspective: 1200px;
      cursor: pointer;
      margin-bottom: 2rem;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    .card-scene.flipped .card-inner { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .card-back { transform: rotateY(180deg); }

    .card-word {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 0.15rem;
    }

    .card-phonetic {
      font-size: 1rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 0.35rem;
    }

    .card-pos {
      font-size: 0.88rem;
      font-style: italic;
      color: var(--muted);
    }

    .card-hint {
      font-size: 0.68rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 1.5rem;
    }

    .card-def {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--ink);
    }

    .card-def-word {
      display: block;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--muted);
      margin-top: 1rem;
    }

    /* Quiz controls */
    .quiz-controls {
      display: flex;
      gap: 2.5rem;
      align-items: center;
    }

    .quiz-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.5rem 0;
      transition: color 0.2s;
      position: relative;
    }
    .quiz-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: currentColor;
      transition: width 0.25s;
    }
    .quiz-btn:hover::after { width: 100%; }
    .quiz-btn.correct-btn:hover { color: #2a5c2a; }
    .quiz-btn.incorrect-btn:hover { color: #8b2020; }
    .quiz-btn.reveal-btn { color: var(--ink); }
    .quiz-btn.reveal-btn:hover { color: var(--ink); }
    .quiz-btn:disabled { opacity: 0.4; cursor: default; pointer-events: none; }

    .quiz-empty {
      text-align: center;
      padding: 4rem 0;
    }
    .quiz-empty p {
      font-size: 0.95rem;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .site-name { display: none; }
      header { padding: 0 1.5rem; height: 48px; justify-content: center; }
      nav { gap: 1.25rem; }
      nav a { font-size: 0.68rem; }
      main { padding: 2rem 1.25rem 4rem; }
      footer { padding: 1rem 1.5rem; }
      .nav-dropdown { left: 0; transform: none; }
      .card-scene { height: 200px; }
      .card-word { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="site-name">A. M. Alcazar</a>
    <nav>
      <div class="nav-item">
        <a href="https://moviemarginalia.com">Writing</a>
        <div class="nav-dropdown">
          <a href="https://moviemarginalia.substack.com" target="_blank">Movie Marginalia</a>
          <a href="https://moviemarginalia.com/selected">Featured Reviews</a>
        </div>
      </div>
      <a href="/photography.html">Photography</a>
      <a href="/bio.html">Bio</a>
      <a href="/cv.html">CV</a>
      <a href="mailto:hello@amalcazar.com">Contact</a>
      <button id="theme-toggle" onclick="toggleTheme()" aria-label="Switch to dark mode"><svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
    </nav>
  </header>

  <main>
    <div class="page-header">
      <span class="page-title">Lexicon</span>
      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-library">Library</button>
        <button class="mode-btn" id="btn-quiz">Quiz</button>
      </div>
    </div>

    <!-- Library mode -->
    <div id="view-library">
      <form class="add-form" id="add-form" autocomplete="off">
        <input
          type="text"
          class="add-input"
          id="word-input"
          placeholder="Add a word…"
          spellcheck="false"
        >
        <button type="submit" class="add-btn" id="add-btn">Add</button>
      </form>
      <p class="status" id="status"></p>
      <ul class="word-list" id="word-list"></ul>
      <p class="empty" id="empty-msg" style="display:none">No words yet. Add one above.</p>
    </div>

    <!-- Quiz mode -->
    <div id="view-quiz" style="display:none">
      <div class="quiz-wrap">
        <p class="quiz-meta" id="quiz-meta"></p>
        <div class="card-scene" id="card-scene" role="button" aria-label="Flip card">
          <div class="card-inner">
            <div class="card-face card-front">
              <span class="card-word" id="card-word"></span>
              <span class="card-phonetic" id="card-phonetic"></span>
              <span class="card-pos" id="card-pos"></span>

              <span class="card-def" id="card-def"></span>

          </div>

        <div class="quiz-controls" id="quiz-controls">
          <button class="quiz-btn reveal-btn" id="reveal-btn">Reveal</button>
        </div>
        <div class="quiz-empty" id="quiz-empty" style="display:none">
          <p id="quiz-empty-primary">No words to review.</p>
          <p id="quiz-empty-secondary">Add some words in the Library.</p>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <span>© A. M. Alcazar</span>
    <span>2026</span>
  </footer>

  <!-- Supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
  (() => {
    // ── Supabase config ──────────────────────────────────────────────────────
    const SUPABASE_URL      = 'https://necmnunwnlnchwojhory.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Zx1YLiLGjUQUL6vMjCFGJQ_XJOYGpIk';
    // ────────────────────────────────────────────────────────────────────────

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let entries = [];      // full word list, loaded from Supabase on init
    let currentMode = 'library';
    let quizQueue = [];    // due words for the current quiz session
    let quizIndex = 0;
    let quizRevealed = false;

    // ── Supabase helpers ─────────────────────────────────────────────────────

    async function fetchAll() {
      const { data, error } = await db.from('words').select('*');
      if (error) throw error;
      return data;
    }

    async function insertWord(word, part_of_speech, definition, phonetic) {
      const { data, error } = await db
        .from('words')
        .insert({ word, part_of_speech, definition, phonetic })
        .select()
        .single();
      if (error) throw error;
      return data;
    }

    async function updateDefinition(id, definition) {
      const { error } = await db.from('words').update({ definition }).eq('id', id);
      if (error) throw error;
    }

    async function updatePhonetic(id, phonetic) {
      const { error } = await db.from('words').update({ phonetic }).eq('id', id);
      if (error) throw error;
    }

    async function updatePartOfSpeech(id, part_of_speech) {
      const { error } = await db.from('words').update({ part_of_speech }).eq('id', id);
      if (error) throw error;
    }

    async function deleteWord(id) {
      const { error } = await db.from('words').delete().eq('id', id);
      if (error) throw error;
    }

    // Correct: quiz_score + 1, next_review = now + 2^(current score) days
    async function markCorrect(id, currentScore) {
      const daysUntilNext = Math.pow(2, currentScore);
      const next_review = new Date(Date.now() + daysUntilNext * 86400000).toISOString();
      const { error } = await db
        .from('words')
        .update({ quiz_score: currentScore + 1, next_review })
        .eq('id', id);
      if (error) throw error;
    }

    // Incorrect: reset quiz_score to 0, next_review = now + 1 hour
    async function markIncorrect(id) {
      const next_review = new Date(Date.now() + 3600000).toISOString();
      const { error } = await db
        .from('words')
        .update({ quiz_score: 0, next_review })
        .eq('id', id);
      if (error) throw error;
    }

    // ── Dictionary APIs ──────────────────────────────────────────────────────

    async function fetchDefinition(word) {
      const lower   = word.trim().toLowerCase();
      const encoded = encodeURIComponent(lower);

      // 1. Free Dictionary API (has IPA phonetics)
      try {
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encoded}`);
        if (res.ok) {
          const data = await res.json();
          const meaning  = data[0]?.meanings?.[0];
          const phonetic = data[0]?.phonetic || data[0]?.phonetics?.find(p => p.text)?.text || '';
          if (meaning?.definitions?.[0]?.definition) {
            return {
              definition:   meaning.definitions[0].definition,
              partOfSpeech: meaning.partOfSpeech || '',
              phonetic,
            };
          }
        }
      } catch {}

      // 2. Wiktionary REST API (broader coverage, no key needed)
      const wikiRes = await fetch(`https://en.wiktionary.org/api/rest_v1/page/definition/${encoded}`);
      if (!wikiRes.ok) throw new Error('Word not found');
      const wikiData = await wikiRes.json();
      const entry = wikiData.en?.[0];
      if (!entry) throw new Error('Word not found');

      // Strip HTML tags from definition
      const tmp = document.createElement('div');
      tmp.innerHTML = entry.definitions?.[0]?.definition || '';

      // Fetch IPA from the full rendered page (IPA lives in the Pronunciation section)
      let phonetic = '';
      try {
        const parseRes = await fetch(
          `https://en.wiktionary.org/w/api.php?action=parse&page=${encoded}&prop=text&format=json&origin=*`
        );
        if (parseRes.ok) {
          const parseData = await parseRes.json();
          const html = parseData.parse?.text?.['*'] || '';
          const doc = new DOMParser().parseFromString(html, 'text/html');
          phonetic = doc.querySelector('.IPA')?.textContent?.trim() || '';
        }
      } catch {}

      return {
        definition:   tmp.textContent.trim(),
        partOfSpeech: (entry.partOfSpeech || '').toLowerCase(),
        phonetic,
      };
    }

    // ── Backfill missing phonetics and part-of-speech ───────────────────────

    async function backfillPhonetics() {
      const missing = entries.filter(e => !e.phonetic || !e.part_of_speech);
      for (const entry of missing) {
        try {
          const result = await fetchDefinition(entry.word);
          let changed = false;
          if (result.phonetic && !entry.phonetic) {
            entry.phonetic = result.phonetic;
            updatePhonetic(entry.id, result.phonetic).catch(() => {});
            changed = true;
          }
          if (result.partOfSpeech && !entry.part_of_speech) {
            entry.part_of_speech = result.partOfSpeech;
            updatePartOfSpeech(entry.id, result.partOfSpeech).catch(() => {});
            changed = true;
          }
          if (changed) renderLibrary();
        } catch {
          // word not found in dictionary — skip silently
        }
      }
    }

    // ── Render library ───────────────────────────────────────────────────────

    function renderLibrary() {
      const list = document.getElementById('word-list');
      const empty = document.getElementById('empty-msg');

      if (entries.length === 0) {
        list.innerHTML = '';
        empty.style.display = '';
        return;
      }
      empty.style.display = 'none';

      const sorted = [...entries].sort((a, b) =>
        a.word.localeCompare(b.word, undefined, { sensitivity: 'base' })
      );

      list.innerHTML = sorted.map(e => `
        <li class="word-entry" data-id="${e.id}">
          <div class="entry-header">
            <span>
              <span class="entry-word">${escHtml(e.word)}</span>${e.part_of_speech ? `<span class="entry-pos">${escHtml(e.part_of_speech)}</span>` : ''}
            </span>
            <span class="entry-actions">
              <button class="entry-btn edit-btn" data-id="${e.id}">Edit</button>
              <button class="entry-btn delete-btn" data-id="${e.id}">Delete</button>
            </span>
          </div>
          ${e.phonetic ? `<p class="entry-phonetic">${escHtml(e.phonetic)}</p>` : ''}
          <p class="entry-def" id="def-${e.id}">${escHtml(e.definition || '')}</p>
        </li>
      `).join('');

      list.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => startEdit(btn.dataset.id));
      });
      list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteEntry(btn.dataset.id));
      });
    }

    function startEdit(id) {
      const entry = entries.find(e => e.id === id);
      if (!entry) return;

      const defEl = document.getElementById(`def-${id}`);
      if (!defEl) return;

      const li = defEl.closest('.word-entry');
      if (li.querySelector('.edit-area')) return;

      defEl.style.display = 'none';

      const textarea = document.createElement('textarea');
      textarea.className = 'edit-area';
      textarea.value = entry.definition || '';
      textarea.rows = Math.max(2, Math.ceil((entry.definition || '').length / 70));

      const controls = document.createElement('div');
      controls.className = 'edit-controls';

      const saveBtn = document.createElement('button');
      saveBtn.className = 'entry-btn';
      saveBtn.textContent = 'Save';

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'entry-btn';
      cancelBtn.textContent = 'Cancel';

      controls.append(saveBtn, cancelBtn);
      defEl.after(textarea);
      textarea.after(controls);
      textarea.focus();

      saveBtn.addEventListener('click', async () => {
        saveBtn.disabled = true;
        const newDef = textarea.value.trim();
        try {
          await updateDefinition(id, newDef);
          entry.definition = newDef;
          renderLibrary();
        } catch {
          saveBtn.disabled = false;
          setStatus('Error saving. Check your connection.');
        }
      });

      cancelBtn.addEventListener('click', () => {
        textarea.remove();
        controls.remove();
        defEl.style.display = '';
      });
    }

    async function deleteEntry(id) {
      try {
        await deleteWord(id);
        entries = entries.filter(e => e.id !== id);
        renderLibrary();
      } catch {
        setStatus('Error deleting word. Check your connection.');
      }
    }

    // ── Quiz ─────────────────────────────────────────────────────────────────

    function buildQuizQueue() {
      const now = new Date().toISOString();
      return [...entries]
        .filter(e => !e.next_review || e.next_review <= now)
        .sort((a, b) => (a.next_review || '').localeCompare(b.next_review || ''));
    }

    function renderQuiz() {
      const scene = document.getElementById('card-scene');
      const empty = document.getElementById('quiz-empty');
      const controls = document.getElementById('quiz-controls');
      const meta = document.getElementById('quiz-meta');

      scene.classList.remove('flipped');
      quizRevealed = false;

      const card = quizQueue[quizIndex] || null;

      if (!card) {
        scene.style.display = 'none';
        empty.style.display = '';
        controls.style.display = 'none';
        if (entries.length === 0) {
          document.getElementById('quiz-empty-primary').textContent = 'No words to review.';
          document.getElementById('quiz-empty-secondary').textContent = 'Add some words in the Library.';
        } else {
          document.getElementById('quiz-empty-primary').textContent = 'All caught up.';
          document.getElementById('quiz-empty-secondary').textContent = 'Check back later for your next review.';
        }
        meta.textContent = '';
        return;
      }

      scene.style.display = '';
      empty.style.display = 'none';
      controls.style.display = '';

      document.getElementById('card-word').textContent = card.word;
      document.getElementById('card-phonetic').textContent = card.phonetic || '';
      document.getElementById('card-pos').textContent = card.part_of_speech || '';
      document.getElementById('card-def').textContent = card.definition || '';
      document.getElementById('card-def-word').textContent = card.word;

      meta.textContent = `${quizIndex + 1} of ${quizQueue.length} due`;

      showRevealControls();
    }

    function showRevealControls() {
      const controls = document.getElementById('quiz-controls');
      controls.innerHTML = '';
      const revealBtn = document.createElement('button');
      revealBtn.className = 'quiz-btn reveal-btn';
      revealBtn.textContent = 'Reveal';
      revealBtn.addEventListener('click', revealCard);
      controls.appendChild(revealBtn);
    }

    function revealCard() {
      if (quizRevealed) return;
      quizRevealed = true;
      document.getElementById('card-scene').classList.add('flipped');

      const controls = document.getElementById('quiz-controls');
      controls.innerHTML = '';

      const incorrectBtn = document.createElement('button');
      incorrectBtn.className = 'quiz-btn incorrect-btn';
      incorrectBtn.textContent = 'Incorrect';
      incorrectBtn.addEventListener('click', () => markAnswer(false));

      const correctBtn = document.createElement('button');
      correctBtn.className = 'quiz-btn correct-btn';
      correctBtn.textContent = 'Correct';
      correctBtn.addEventListener('click', () => markAnswer(true));

      controls.append(incorrectBtn, correctBtn);
    }

    async function markAnswer(correct) {
      const card = quizQueue[quizIndex];
      if (!card) return;

      document.getElementById('quiz-controls').querySelectorAll('button').forEach(b => b.disabled = true);

      try {
        const currentScore = card.quiz_score || 0;
        if (correct) {
          await markCorrect(card.id, currentScore);
          const entry = entries.find(e => e.id === card.id);
          if (entry) {
            entry.quiz_score = currentScore + 1;
            entry.next_review = new Date(
              Date.now() + Math.pow(2, currentScore) * 86400000
            ).toISOString();
          }
        } else {
          await markIncorrect(card.id);
          const entry = entries.find(e => e.id === card.id);
          if (entry) {
            entry.quiz_score = 0;
            entry.next_review = new Date(Date.now() + 3600000).toISOString();
          }
        }
      } catch {
        // proceed to next card even if the DB write fails
      }

      quizIndex++;
      renderQuiz();
    }

    // ── Mode switching ───────────────────────────────────────────────────────

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('view-library').style.display = mode === 'library' ? '' : 'none';
      document.getElementById('view-quiz').style.display   = mode === 'quiz'    ? '' : 'none';
      document.getElementById('btn-library').classList.toggle('active', mode === 'library');
      document.getElementById('btn-quiz').classList.toggle('active', mode === 'quiz');
      if (mode === 'quiz') {
        quizQueue = buildQuizQueue();
        quizIndex = 0;
        renderQuiz();
      }
    }

    // ── Status helper ────────────────────────────────────────────────────────

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    // ── Add form ─────────────────────────────────────────────────────────────

    document.getElementById('add-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('word-input');
      const word = input.value.trim();
      if (!word) return;

      const btn = document.getElementById('add-btn');

      if (entries.some(en => en.word.toLowerCase() === word.toLowerCase())) {
        setStatus(`"${word}" is already in your lexicon.`);
        return;
      }

      btn.disabled = true;
      setStatus('Fetching definition…');

      let definition = '';
      let partOfSpeech = '';
      let phonetic = '';

      try {
        const result = await fetchDefinition(word);
        definition   = result.definition;
        partOfSpeech = result.partOfSpeech;
        phonetic     = result.phonetic;
        setStatus('');
      } catch {
        setStatus(`Could not find a definition for "${word}". You can add it manually.`);
      }

      const capitalized = word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();

      try {
        const newEntry = await insertWord(capitalized, partOfSpeech, definition, phonetic);
        entries.push(newEntry);
        input.value = '';
        renderLibrary();
      } catch {
        setStatus('Error saving word. Check your connection.');
      } finally {
        btn.disabled = false;
      }
    });

    // ── Card tap to reveal ───────────────────────────────────────────────────

    document.getElementById('card-scene').addEventListener('click', () => {
      if (!quizRevealed) revealCard();
    });

    // ── Mode buttons ─────────────────────────────────────────────────────────

    document.getElementById('btn-library').addEventListener('click', () => setMode('library'));
    document.getElementById('btn-quiz').addEventListener('click', () => setMode('quiz'));

    // ── Keyboard shortcuts ───────────────────────────────────────────────────

    document.addEventListener('keydown', (e) => {
      if (currentMode !== 'quiz' || !quizQueue[quizIndex]) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        if (!quizRevealed) revealCard();
      } else if (quizRevealed) {
        if (e.key === 'ArrowRight' || e.key === '1') markAnswer(true);
        if (e.key === 'ArrowLeft'  || e.key === '2') markAnswer(false);
      }
    });

    // ── Escape HTML ──────────────────────────────────────────────────────────

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Init ─────────────────────────────────────────────────────────────────

    (async () => {
      setStatus('Loading…');
      try {
        entries = await fetchAll();
        setStatus('');
      } catch {
        setStatus('Could not connect to database. Check your Supabase config.');
      }
      renderLibrary();
      backfillPhonetics();
    })();

  })();
  </script>

  <script src="/scripts/theme.js"></script>
</body>
</html>
