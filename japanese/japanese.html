<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日本語 — A. M. Alcazar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/theme.css">
  <script>(function(){if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #fff7ed; --ink: #1a1814; --muted: #8a8478; --rule: #d8d2c8; }

    html, body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 0 2.5rem;
      height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .site-name {
      font-weight: 400;
      font-size: 1rem;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-decoration: none;
    }
    nav { display: flex; gap: 2rem; }
    nav a {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--ink); }

    main {
      flex: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
      width: 100%;
    }

    .page-title {
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 0.3rem;
    }
    .page-subtitle {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      border: 1px solid var(--rule);
    }

    .course-card {
      padding: 1.5rem;
      border-right: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .course-label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .course-title { font-size: 1.2rem; font-weight: 400; }
    .course-jp { font-size: 1rem; color: var(--muted); }

    .lesson-selector {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }
    .lesson-selector label {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      white-space: nowrap;
    }
    .lesson-selector select {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.82rem;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--rule);
      color: var(--ink);
      padding: 0.1rem 0.2rem;
      cursor: pointer;
      outline: none;
    }
    .lesson-selector select:disabled { color: var(--muted); cursor: default; }
    .lesson-selector select:focus { border-bottom-color: var(--ink); }

    .card-link {
      margin-top: 0.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.2s;
    }
    .card-link:hover { color: var(--ink); }
    .card-link.unavailable { pointer-events: none; opacity: 0.38; }

    footer {
      padding: 1rem 2.5rem;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    footer span, footer a {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      text-decoration: none;
    }
    footer a:hover { color: var(--ink); }

    @media (max-width: 680px) {
      .site-name { display: none; }
      header { padding: 0 1rem; height: 48px; justify-content: center; }
      nav { gap: 0.75rem; }
      nav a { font-size: 0.62rem; }
      main { padding: 2rem 1rem 3rem; }
      .course-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="site-name">A. M. Alcazar</a>
    <nav>
      <a href="https://moviemarginalia.com">Writing</a>
      <a href="/photography.html">Photography</a>
      <a href="/bio.html">Bio</a>
      <a href="/cv.html">CV</a>
      <a href="mailto:hello@amalcazar.com">Contact</a>
      <button id="theme-toggle" onclick="toggleTheme()" aria-label="Switch to dark mode"><svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
    </nav>
  </header>

  <main>
    <h1 class="page-title">日本語</h1>
    <p class="page-subtitle">Japanese · Seven Courses</p>
    <div class="course-grid" id="courseGrid"></div>
  </main>

  <footer>
    <span>© A. M. Alcazar</span>
    <a href="mailto:hello@moviemarginalia.com">2026</a>
  </footer>

  <script>
    const COURSES = [
      { num: 1, title: "Level 1", jp: "初級一", maxLessons: 25, available: true },
      { num: 2, title: "Level 2", jp: "初級二", maxLessons: 25, available: true },
      { num: 3, title: "Level 3", jp: "中級一", maxLessons: 25, available: false },
      { num: 4, title: "Level 4", jp: "中級二", maxLessons: 25, available: false },
      { num: 5, title: "Level 5", jp: "上級一", maxLessons: 25, available: false },
      { num: 6, title: "Level 6", jp: "上級二", maxLessons: 25, available: false },
      { num: 7, title: "Level 7", jp: "上級三", maxLessons: 25, available: false },
    ];

    const grid = document.getElementById('courseGrid');

    // Kana card (no lesson selector — uses its own selection UI)
    const kanaCard = document.createElement('div');
    kanaCard.className = 'course-card';
    kanaCard.innerHTML = `
      <div class="course-label">Foundations</div>
      <div class="course-title">Kana</div>
      <div class="course-jp">かな</div>
      <div style="font-size:0.72rem;letter-spacing:0.06em;color:var(--muted);margin-top:0.25rem;">Hiragana · Katakana · Kanji</div>
      <a href="kana_quiz.html" class="card-link" style="margin-top:0.5rem;">Begin quiz →</a>
    `;
    grid.appendChild(kanaCard);

    COURSES.forEach(course => {
      const key = `jp_course${course.num}_maxLesson`;
      const saved = parseInt(localStorage.getItem(key)) || 1;

      let options = '';
      for (let i = 1; i <= course.maxLessons; i++) {
        options += `<option value="${i}"${i === saved ? ' selected' : ''}>Lesson ${i}</option>`;
      }

      const card = document.createElement('div');
      card.className = 'course-card';
      card.innerHTML = `
        <div class="course-label">Course ${course.num}</div>
        <div class="course-title">${course.title}</div>
        <div class="course-jp">${course.jp}</div>
        <div class="lesson-selector">
          <label for="sel${course.num}">Up to</label>
          <select id="sel${course.num}"${!course.available ? ' disabled' : ''}>${options}</select>
        </div>
        <a href="japanese${course.num}_quiz.html" class="card-link${!course.available ? ' unavailable' : ''}">
          ${course.available ? 'Begin quiz →' : 'Coming soon'}
        </a>
      `;

      if (course.available) {
        card.querySelector('select').addEventListener('change', e => {
          localStorage.setItem(key, e.target.value);
        });
      }

      grid.appendChild(card);
    });
  </script>
  <script src="/scripts/theme.js"></script>
</body>
</html>
