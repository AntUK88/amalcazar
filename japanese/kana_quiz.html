<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kana Quiz — かな</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #fff7ed; --ink: #1a1814; --muted: #8a8478; --rule: #d8d2c8;
      --green: #2a5c2a; --green-bg: #eef4ee;
      --red: #7a2828; --red-bg: #f4eeee;
    }

    html, body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 0 2.5rem;
      height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .site-name { font-weight: 400; font-size: 1rem; letter-spacing: 0.06em; color: var(--ink); text-decoration: none; }
    nav { display: flex; gap: 2rem; }
    nav a { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    nav a:hover { color: var(--ink); }

    main { flex: 1; max-width: 680px; margin: 0 auto; padding: 3rem 2rem 4rem; width: 100%; }

    .back-link { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: inline-block; margin-bottom: 2rem; transition: color 0.2s; }
    .back-link:hover { color: var(--ink); }

    /* ── Start screen ─────────────────────────────────────────────── */
    .quiz-title { font-size: clamp(1.8rem, 3vw, 2.6rem); font-weight: 400; letter-spacing: -0.01em; margin-bottom: 0.3rem; }
    .quiz-meta { font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 2.5rem; }

    .settings-panel { border: 1px solid var(--rule); margin-bottom: 1.25rem; }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--rule);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 0.8rem; letter-spacing: 0.06em; color: var(--muted); white-space: nowrap; margin-right: 1rem; flex-shrink: 0; }

    .toggle-group { display: flex; border: 1px solid var(--rule); flex-shrink: 0; }
    .toggle {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      padding: 0.3rem 0.9rem;
      background: transparent;
      border: none;
      border-right: 1px solid var(--rule);
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .toggle:last-child { border-right: none; }
    .toggle.active { background: var(--ink); color: var(--cream); }

    /* ── Group selection ──────────────────────────────────────────── */
    .group-section { padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--rule); }
    .group-section:last-child { border-bottom: none; }
    .group-section-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.65rem;
    }
    .group-section-label { font-size: 0.78rem; letter-spacing: 0.08em; color: var(--muted); flex: 1; }
    .mini-btn {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.15rem 0.55rem;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .mini-btn:hover { border-color: var(--ink); color: var(--ink); }

    .chip-grid { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .chip {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.8rem;
      padding: 0.25rem 0.65rem;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .chip.on { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .chip:hover:not(.on) { border-color: var(--muted); color: var(--ink); }

    .pool-info { font-size: 0.78rem; color: var(--muted); font-style: italic; margin-bottom: 1.5rem; }

    .start-btn {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem 2rem;
      background: var(--ink);
      color: var(--cream);
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .start-btn:hover { opacity: 0.82; }
    .start-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Quiz shared ──────────────────────────────────────────────── */
    .progress-row { display: flex; justify-content: space-between; margin-bottom: 0.75rem; }
    .progress-label { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .progress-bar { height: 2px; background: var(--rule); margin-bottom: 1.5rem; position: relative; }
    .progress-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--ink); transition: width 0.3s ease; }

    .question-card {
      border: 1px solid var(--rule);
      padding: 2.5rem 2rem;
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .question-kana { font-size: clamp(3rem, 14vw, 6rem); font-weight: 400; line-height: 1; margin-bottom: 0.5rem; }
    .question-reading { font-size: 1.05rem; color: var(--muted); font-style: italic; }

    /* ── Multiple choice ──────────────────────────────────────────── */
    .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem; margin-bottom: 1.5rem; }
    .answer-btn {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1rem;
      line-height: 1.35;
      padding: 0.8rem 1rem;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink);
      cursor: pointer;
      text-align: center;
      transition: border-color 0.12s, background 0.12s, color 0.12s;
    }
    .answer-btn:hover:not(:disabled) { border-color: var(--muted); }
    .answer-btn.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
    .answer-btn.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }

    /* ── Flashcard ────────────────────────────────────────────────── */
    .flashcard {
      border: 1px solid var(--rule);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
      text-align: center;
      margin-bottom: 1.25rem;
      cursor: pointer;
      transition: border-color 0.2s;
      user-select: none;
    }
    .flashcard.revealed { cursor: default; }
    .flashcard:not(.revealed):hover { border-color: var(--muted); }
    .flashcard-answer { font-size: clamp(1.4rem, 4vw, 2.2rem); font-style: italic; }
    .flashcard-hint { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 1rem; }
    .flash-actions { display: flex; gap: 0.6rem; margin-bottom: 1.5rem; }
    .flash-btn {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.65rem 1.4rem;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .flash-btn:hover { border-color: var(--ink); color: var(--ink); }
    .flash-btn.primary { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .flash-btn.primary:hover { opacity: 0.82; }

    /* ── Results ──────────────────────────────────────────────────── */
    .result-score { font-size: clamp(3rem, 12vw, 6rem); font-weight: 400; line-height: 1; margin-bottom: 0.25rem; }
    .result-label { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 2rem; }
    .missed-section-label { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .missed-list { border: 1px solid var(--rule); margin-bottom: 2rem; }
    .missed-item { display: flex; align-items: baseline; gap: 0.75rem; padding: 0.7rem 1.25rem; border-bottom: 1px solid var(--rule); }
    .missed-item:last-child { border-bottom: none; }
    .missed-kana { font-size: 1.6rem; }
    .missed-answer { font-size: 0.9rem; color: var(--muted); }
    .result-actions { display: flex; gap: 0.6rem; }
    .result-btn {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.65rem 1.4rem;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .result-btn:hover { border-color: var(--ink); color: var(--ink); }
    .result-btn.primary { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .result-btn.primary:hover { opacity: 0.82; }

    footer { padding: 1rem 2.5rem; border-top: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    footer span, footer a { font-size: 0.7rem; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; text-decoration: none; }
    footer a:hover { color: var(--ink); }

    [hidden] { display: none !important; }

    @media (max-width: 680px) {
      .site-name { display: none; }
      header { padding: 0 1rem; height: 48px; justify-content: center; }
      nav { gap: 0.75rem; }
      nav a { font-size: 0.62rem; }
      main { padding: 1.5rem 1rem 3rem; }
      .answer-grid { grid-template-columns: 1fr 1fr; }
      .toggle { padding: 0.3rem 0.55rem; font-size: 0.72rem; }
      .flash-actions { flex-direction: column; }
    }
  </style>
</head>

        </div>

        <!-- Group selection (rendered by JS) -->
        <div id="groupPanel"></div>

        <!-- Mode -->
        <div class="setting-row">

          <div class="toggle-group">
            <button class="toggle active" id="mcBtn">Multiple choice</button>

        </div>

      </div>

      <button class="start-btn" id="startBtn">Start quiz →</button>
    </div>

    <!-- ── Multiple choice screen ───────────────────────────────── -->
    <div id="quizScreenMC" hidden>

        <div class="question-reading" id="mcReading"></div>
      </div>
      <div class="answer-grid" id="mcOptions"></div>
    </div>

    <!-- ── Flashcard screen ──────────────────────────────────────── -->
    <div id="quizScreenFlash" hidden>
      <div class="progress-row">
        <span class="progress-label" id="flashProgress"></span>
        <span class="progress-label" id="flashScore"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="flashFill"></div></div>
      <div class="flashcard" id="flashCard">
        <div class="question-kana" id="flashKana"></div>
        <div class="question-reading" id="flashReading"></div>
        <div class="flashcard-answer" id="flashAnswer" hidden></div>
        <div class="flashcard-hint" id="flashHint">tap to reveal</div>
      </div>
      <div class="flash-actions" id="flashActions" hidden>
        <button class="flash-btn primary" id="gotItBtn">Got it ✓</button>
        <button class="flash-btn" id="tryAgainBtn">Try again ↺</button>
      </div>
    </div>

    <!-- ── Result screen ─────────────────────────────────────────── -->
    <div id="resultScreen" hidden>
      <div class="result-score" id="resultScore"></div>
      <p class="result-label" id="resultLabel"></p>
      <p class="missed-section-label" id="missedLabel"></p>
      <div class="missed-list" id="missedList"></div>
      <div class="result-actions">
        <button class="result-btn primary" id="retryBtn">Try again</button>
        <button class="result-btn" id="newSelBtn">New selection</button>
      </div>
    </div>

  </main>

    <span>© A. M. Alcazar</span>

        { kana:'土', romaji:'tsuchi',  answer:'Earth / Soil',type:'kanji' },

        { kana:'花', romaji:'hana',    answer:'Flower',     type:'kanji' },
        { kana:'雨', romaji:'ame',     answer:'Rain',       type:'kanji' },
      ]},
      { id: 'j-dir',  name: 'Direction', chars: [
        { kana:'上', romaji:'ue',      answer:'Above / Up',  type:'kanji' },
        { kana:'下', romaji:'shita',   answer:'Below / Down',type:'kanji' },
        { kana:'左', romaji:'hidari',  answer:'Left',        type:'kanji' },
        { kana:'右', romaji:'migi',    answer:'Right',       type:'kanji' },
        { kana:'中', romaji:'naka',    answer:'Inside / Middle',type:'kanji' },
        { kana:'外', romaji:'soto',    answer:'Outside',     type:'kanji' },
        { kana:'前', romaji:'mae',     answer:'Front / Before',type:'kanji' },
        { kana:'後', romaji:'ato',     answer:'After / Behind',type:'kanji' },
        { kana:'北', romaji:'kita',    answer:'North',       type:'kanji' },
        { kana:'南', romaji:'minami',  answer:'South',       type:'kanji' },
        { kana:'東', romaji:'higashi', answer:'East',        type:'kanji' },
        { kana:'西', romaji:'nishi',   answer:'West',        type:'kanji' },
      ]},
      { id: 'j-desc', name: 'Descriptors', chars: [
        { kana:'大', romaji:'dai/oo',  answer:'Big / Large',  type:'kanji' },
        { kana:'小', romaji:'shou/ko', answer:'Small / Little',type:'kanji' },
        { kana:'高', romaji:'taka',    answer:'Tall / Expensive',type:'kanji' },
        { kana:'安', romaji:'yasu',    answer:'Cheap / Safe', type:'kanji' },
        { kana:'新', romaji:'shin/atara',answer:'New',        type:'kanji' },
        { kana:'古', romaji:'furu',    answer:'Old',          type:'kanji' },
        { kana:'多', romaji:'oo',      answer:'Many',         type:'kanji' },
        { kana:'少', romaji:'suku',    answer:'Few',          type:'kanji' },
        { kana:'長', romaji:'naga',    answer:'Long',         type:'kanji' },
        { kana:'白', romaji:'shiro',   answer:'White',        type:'kanji' },
        { kana:'黒', romaji:'kuro',    answer:'Black',        type:'kanji' },
        { kana:'赤', romaji:'aka',     answer:'Red',          type:'kanji' },
        { kana:'青', romaji:'ao',      answer:'Blue',         type:'kanji' },
      ]},
    ],
  };

  // Flat arrays used for wrong-answer generation
  const ALL_KANA   = [...GROUPS.hiragana, ...GROUPS.katakana].flatMap(g => g.chars);
  const ALL_KANJI  = GROUPS.kanji.flatMap(g => g.chars);

  // ── State ─────────────────────────────────────────────────────────────────
  const Q_COUNT = 10;
  let activeScript = 'hiragana';        // 'hiragana' | 'katakana' | 'kanji' | 'all'
  let selectedGroups = new Set();       // group ids
  let mode = 'mc';
  let questions = [], currentQ = 0, score = 0, missed = [], flashRevealed = false;

  // ── Script buttons ─────────────────────────────────────────────────────────
  const scriptBtns = {
    hiragana: document.getElementById('btnHira'),
    katakana: document.getElementById('btnKata'),
    kanji:    document.getElementById('btnKanji'),
    all:      document.getElementById('btnAll'),
  };

  Object.entries(scriptBtns).forEach(([key, btn]) => {
    btn.addEventListener('click', () => setScript(key));
  });

  function setScript(s) {
    activeScript = s;
    Object.entries(scriptBtns).forEach(([k, b]) => b.classList.toggle('active', k === s));
    renderGroupPanel();
    updatePoolInfo();
  }

  // ── Group panel ────────────────────────────────────────────────────────────
  function getActiveGroupDefs() {
    if (activeScript === 'all') {
      return [
        { label: 'Hiragana', groups: GROUPS.hiragana },
        { label: 'Katakana', groups: GROUPS.katakana },
        { label: 'Kanji',    groups: GROUPS.kanji    },
      ];
    }
    return [{ label: null, groups: GROUPS[activeScript] }];
  }

  function renderGroupPanel() {
    const panel = document.getElementById('groupPanel');
    panel.innerHTML = '';

    getActiveGroupDefs().forEach(({ label, groups }) => {
      const section = document.createElement('div');
      section.className = 'group-section';

      const header = document.createElement('div');
      header.className = 'group-section-header';
      if (label) {
        const lbl = document.createElement('span');
        lbl.className = 'group-section-label';
        lbl.textContent = label;
        header.appendChild(lbl);
      } else {
        header.appendChild(Object.assign(document.createElement('span'), { className: 'group-section-label', textContent: 'Groups' }));
      }

      const allBtn = document.createElement('button');
      allBtn.className = 'mini-btn';
      allBtn.textContent = 'All';
      allBtn.addEventListener('click', () => {
        groups.forEach(g => selectedGroups.add(g.id));
        renderGroupPanel();
        updatePoolInfo();
      });

      const noneBtn = document.createElement('button');
      noneBtn.className = 'mini-btn';
      noneBtn.textContent = 'None';
      noneBtn.addEventListener('click', () => {
        groups.forEach(g => selectedGroups.delete(g.id));
        renderGroupPanel();
        updatePoolInfo();
      });

      header.appendChild(allBtn);
      header.appendChild(noneBtn);
      section.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'chip-grid';

      groups.forEach(g => {
        const chip = document.createElement('button');
        chip.className = 'chip' + (selectedGroups.has(g.id) ? ' on' : '');
        chip.textContent = g.name;
        chip.addEventListener('click', () => {
          selectedGroups.has(g.id) ? selectedGroups.delete(g.id) : selectedGroups.add(g.id);
          chip.classList.toggle('on');
          updatePoolInfo();
        });
        grid.appendChild(chip);
      });

      section.appendChild(grid);
      panel.appendChild(section);
    });
  }

  // ── Pool ───────────────────────────────────────────────────────────────────
  function getPool() {
    const allGroups = [...GROUPS.hiragana, ...GROUPS.katakana, ...GROUPS.kanji];
    return allGroups
      .filter(g => selectedGroups.has(g.id))
      .flatMap(g => g.chars);
  }

  function updatePoolInfo() {
    const pool = getPool();
    const q = Math.min(Q_COUNT, pool.length);
    const info = document.getElementById('poolInfo');
    if (pool.length === 0) {
      info.textContent = 'Select at least one group to start.';
    } else {
      info.textContent = `${q} question${q !== 1 ? 's' : ''} · from ${pool.length} character${pool.length !== 1 ? 's' : ''}`;
    }
    document.getElementById('startBtn').disabled = pool.length < 2;
  }

  // ── Init: select all hiragana basic groups by default ─────────────────────
  GROUPS.hiragana.slice(0, 10).forEach(g => selectedGroups.add(g.id)); // あ行 through わ行
  renderGroupPanel();
  updatePoolInfo();

  // ── Mode toggles ───────────────────────────────────────────────────────────
  document.getElementById('mcBtn').addEventListener('click', () => setMode('mc'));
  document.getElementById('flashBtn').addEventListener('click', () => setMode('flash'));

  function setMode(m) {
    mode = m;
    document.getElementById('mcBtn').classList.toggle('active', m === 'mc');
    document.getElementById('flashBtn').classList.toggle('active', m === 'flash');
  }

  // ── Utilities ──────────────────────────────────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function showOnly(id) {
    ['startScreen','quizScreenMC','quizScreenFlash','resultScreen'].forEach(s => {
      document.getElementById(s).hidden = s !== id;
    });
  }

  // Wrong answers come from the appropriate flat pool (kana or kanji)
  // so there are always enough distractors regardless of which groups are selected.
  function getWrongAnswers(q, count) {
    const pool = q.type === 'kanji' ? ALL_KANJI : ALL_KANA;
    const others = shuffle(pool.filter(c => c.answer !== q.answer));
    return others.slice(0, count);
  }

  // ── Start / restart ────────────────────────────────────────────────────────
  document.getElementById('startBtn').addEventListener('click', startQuiz);
  document.getElementById('retryBtn').addEventListener('click', startQuiz);
  document.getElementById('newSelBtn').addEventListener('click', () => showOnly('startScreen'));

  function startQuiz() {
    const pool = getPool();
    questions = shuffle(pool).slice(0, Math.min(Q_COUNT, pool.length));
    currentQ = 0; score = 0; missed = [];
    if (mode === 'mc') { showOnly('quizScreenMC'); renderMC(); }
    else               { showOnly('quizScreenFlash'); renderFlash(); }
  }

  // ── Multiple choice ────────────────────────────────────────────────────────
  function renderMC() {
    const q = questions[currentQ];
    const total = questions.length;

    document.getElementById('mcProgress').textContent = `${currentQ + 1} / ${total}`;
    document.getElementById('mcScore').textContent = `${score} correct`;
    document.getElementById('mcFill').style.width = `${(currentQ / total) * 100}%`;
    document.getElementById('mcKana').textContent = q.kana;

    // Show romaji reading on question card only for kanji (it's not the answer)
    const reading = document.getElementById('mcReading');
    reading.textContent = q.type === 'kanji' ? q.romaji : '';
    reading.hidden = q.type !== 'kanji';

    const wrongs = getWrongAnswers(q, 3);
    const options = shuffle([q, ...wrongs]);

    const grid = document.getElementById('mcOptions');
    grid.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.textContent = opt.answer;
      btn.addEventListener('click', () => handleMC(btn, opt.answer === q.answer, q));
      grid.appendChild(btn);
    });
  }

  function handleMC(clicked, correct, q) {
    document.querySelectorAll('.answer-btn').forEach(b => {
      b.disabled = true;
      if (b.textContent === q.answer) b.classList.add('correct');
    });
    if (correct) { score++; } else { clicked.classList.add('wrong'); missed.push(q); }
    document.getElementById('mcScore').textContent = `${score} correct`;
    setTimeout(() => { currentQ++; currentQ < questions.length ? renderMC() : showResults(); }, 1200);
  }

  // ── Flashcard ──────────────────────────────────────────────────────────────
  function renderFlash() {
    const q = questions[currentQ];
    const total = questions.length;
    flashRevealed = false;

    document.getElementById('flashProgress').textContent = `${currentQ + 1} / ${total}`;
    document.getElementById('flashScore').textContent = `${score} correct`;
    document.getElementById('flashFill').style.width = `${(currentQ / total) * 100}%`;
    document.getElementById('flashKana').textContent = q.kana;

    const reading = document.getElementById('flashReading');
    reading.textContent = q.type === 'kanji' ? q.romaji : '';
    reading.hidden = q.type !== 'kanji';

    document.getElementById('flashAnswer').textContent = q.answer;
    document.getElementById('flashAnswer').hidden = true;
    document.getElementById('flashHint').hidden = false;
    document.getElementById('flashActions').hidden = true;
    document.getElementById('flashCard').classList.remove('revealed');
  }

  document.getElementById('flashCard').addEventListener('click', () => {
    if (flashRevealed) return;
    flashRevealed = true;
    document.getElementById('flashAnswer').hidden = false;
    document.getElementById('flashHint').hidden = true;
    document.getElementById('flashActions').hidden = false;
    document.getElementById('flashCard').classList.add('revealed');
  });

  document.getElementById('gotItBtn').addEventListener('click', () => rateFlash(true));
  document.getElementById('tryAgainBtn').addEventListener('click', () => rateFlash(false));

  function rateFlash(gotIt) {
    if (gotIt) score++;
    else missed.push(questions[currentQ]);
    document.getElementById('flashScore').textContent = `${score} correct`;
    currentQ++;
    currentQ < questions.length ? renderFlash() : showResults();
  }

  // ── Results ────────────────────────────────────────────────────────────────
  function showResults() {
    showOnly('resultScreen');
    const total = questions.length;
    document.getElementById('resultScore').textContent = `${score} / ${total}`;
    document.getElementById('resultLabel').textContent =
      score === total      ? 'Perfect!' :
      score >= total * 0.8 ? 'Great work.' :
      score >= total * 0.6 ? 'Good effort.' : 'Keep practicing.';

    const missedList  = document.getElementById('missedList');
    const missedLabel = document.getElementById('missedLabel');
    missedList.innerHTML = '';

    if (missed.length === 0) {
      missedList.hidden = true; missedLabel.hidden = true;
    } else {
      missedList.hidden = false; missedLabel.hidden = false;
      missedLabel.textContent = `Missed — ${missed.length} character${missed.length !== 1 ? 's' : ''}`;
      missed.forEach(item => {
        const row = document.createElement('div');
        row.className = 'missed-item';
        row.innerHTML = `
          <span class="missed-kana">${item.kana}</span>
          <span class="missed-answer">${item.romaji}</span>
          ${item.type === 'kanji' ? `<span class="missed-answer" style="margin-left:auto">${item.answer}</span>` : ''}
        `;
        missedList.appendChild(row);
      });
    }
  }
