<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日本語 Quiz — Level 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/theme.css">
  <script>(function(){if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #fff7ed; --ink: #1a1814; --muted: #8a8478; --rule: #d8d2c8;
      --green: #2a5c2a; --green-bg: #eef4ee;
      --red: #7a2828; --red-bg: #f4eeee;
    }

    html, body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 0 2.5rem;
      height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .site-name {
      font-weight: 400;
      font-size: 1rem;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-decoration: none;
    }
    nav { display: flex; gap: 2rem; }
    nav a {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--ink); }

    main {
      flex: 1;
      max-width: 660px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
      width: 100%;
    }

    .back-link {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 2rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--ink); }

    /* ── Start screen ─────────────────────────────────────────────── */
    .quiz-title {
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 0.3rem;
    }
    .quiz-meta {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .settings-panel {
      border: 1px solid var(--rule);
      margin-bottom: 1.25rem;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--rule);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label {
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .toggle-group { display: flex; border: 1px solid var(--rule); }
    .toggle {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      padding: 0.3rem 0.9rem;
      background: transparent;
      border: none;
      border-right: 1px solid var(--rule);
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .toggle:last-child { border-right: none; }
    .toggle.active { background: var(--ink); color: var(--cream); }

    .lesson-select {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.85rem;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--rule);
      color: var(--ink);
      padding: 0.1rem 0.3rem;
      cursor: pointer;
      outline: none;
    }
    .lesson-select:focus { border-bottom-color: var(--ink); }

    .pool-info {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 1.5rem;
    }

    .start-btn {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem 2rem;
      background: var(--ink);
      color: var(--cream);
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .start-btn:hover { opacity: 0.82; }
    .start-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Quiz shared ──────────────────────────────────────────────── */
    .progress-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .progress-label {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .progress-bar {
      height: 2px;
      background: var(--rule);
      margin-bottom: 1.5rem;
      position: relative;
    }
    .progress-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      background: var(--ink);
      transition: width 0.3s ease;
    }

    .question-card {
      border: 1px solid var(--rule);
      padding: 2.5rem 2rem;
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .question-jp {
      font-size: clamp(2.2rem, 8vw, 4rem);
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }
    .question-romaji {
      font-size: 1.05rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Multiple choice ──────────────────────────────────────────── */
    .answer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
      margin-bottom: 1.5rem;
    }
    .answer-btn {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1rem;
      line-height: 1.35;
      padding: 0.8rem 1rem;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.12s, background 0.12s, color 0.12s;
    }
    .answer-btn:hover:not(:disabled) { border-color: var(--muted); }
    .answer-btn.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
    .answer-btn.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }

    /* ── Flashcard ────────────────────────────────────────────────── */
    .flashcard {
      border: 1px solid var(--rule);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
      text-align: center;
      margin-bottom: 1.25rem;
      cursor: pointer;
      transition: border-color 0.2s;
      user-select: none;
    }
    .flashcard.revealed { cursor: default; }
    .flashcard:not(.revealed):hover { border-color: var(--muted); }
    .flashcard-en { font-size: clamp(1.4rem, 4vw, 2.2rem); font-style: italic; }
    .flashcard-hint {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 1rem;
    }
    .flash-actions {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }
    .flash-btn {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.65rem 1.4rem;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .flash-btn:hover { border-color: var(--ink); color: var(--ink); }
    .flash-btn.primary { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .flash-btn.primary:hover { opacity: 0.82; }

    /* ── Results ──────────────────────────────────────────────────── */
    .result-score {
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 400;
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .result-label {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .missed-section-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .missed-list {
      border: 1px solid var(--rule);
      margin-bottom: 2rem;
    }
    .missed-item {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0.7rem 1.25rem;
      border-bottom: 1px solid var(--rule);
    }
    .missed-item:last-child { border-bottom: none; }
    .missed-jp { font-size: 1.1rem; }
    .missed-romaji { font-size: 0.82rem; color: var(--muted); font-style: italic; }
    .missed-en { margin-left: auto; color: var(--muted); font-size: 0.9rem; }
    .result-actions { display: flex; gap: 0.6rem; }
    .result-btn {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.65rem 1.4rem;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .result-btn:hover { border-color: var(--ink); color: var(--ink); }
    .result-btn.primary { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .result-btn.primary:hover { opacity: 0.82; }

    footer {
      padding: 1rem 2.5rem;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    footer span, footer a {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      text-decoration: none;
    }
    footer a:hover { color: var(--ink); }

    [hidden] { display: none !important; }

    @media (max-width: 680px) {
      .site-name { display: none; }
      header { padding: 0 1rem; height: 48px; justify-content: center; }
      nav { gap: 0.75rem; }
      nav a { font-size: 0.62rem; }
      main { padding: 1.5rem 1rem 3rem; }
      .answer-grid { grid-template-columns: 1fr; }
      .flash-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="site-name">A. M. Alcazar</a>
    <nav>
      <a href="https://moviemarginalia.com">Writing</a>
      <a href="/photography.html">Photography</a>
      <a href="/bio.html">Bio</a>
      <a href="/cv.html">CV</a>
      <a href="mailto:hello@amalcazar.com">Contact</a>
      <button id="theme-toggle" onclick="toggleTheme()" aria-label="Switch to dark mode"><svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
    </nav>
  </header>

  <main>

    <!-- ── Start screen ─────────────────────────────────────────── -->
    <div id="startScreen">
      <a href="japanese.html" class="back-link">← 日本語</a>
      <h1 class="quiz-title">日本語 Quiz</h1>
      <p class="quiz-meta">JapanesePod101 · Level 1 · Lessons 1–25</p>

      <div class="settings-panel">
        <div class="setting-row">
          <span class="setting-label">Quiz up to</span>
          <select id="lessonSelect" class="lesson-select"></select>
        </div>
        <div class="setting-row">
          <span class="setting-label">Mode</span>
          <div class="toggle-group">
            <button class="toggle active" id="mcBtn">Multiple choice</button>
            <button class="toggle" id="flashBtn">Flashcard</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Show romaji</span>
          <div class="toggle-group">
            <button class="toggle active" id="romajiOnBtn">Yes</button>
            <button class="toggle" id="romajiOffBtn">No</button>
          </div>
        </div>
      </div>

      <p class="pool-info" id="poolInfo"></p>
      <button class="start-btn" id="startBtn">Start quiz →</button>
    </div>

    <!-- ── Multiple choice screen ───────────────────────────────── -->
    <div id="quizScreenMC" hidden>
      <div class="progress-row">
        <span class="progress-label" id="mcProgress"></span>
        <span class="progress-label" id="mcScore"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="mcFill"></div></div>
      <div class="question-card">
        <div class="question-jp" id="mcJp"></div>
        <div class="question-romaji" id="mcRomaji"></div>
      </div>
      <div class="answer-grid" id="mcOptions"></div>
    </div>

    <!-- ── Flashcard screen ──────────────────────────────────────── -->
    <div id="quizScreenFlash" hidden>
      <div class="progress-row">
        <span class="progress-label" id="flashProgress"></span>
        <span class="progress-label" id="flashScore"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="flashFill"></div></div>
      <div class="flashcard" id="flashCard">
        <div class="question-jp" id="flashJp"></div>
        <div class="question-romaji" id="flashRomaji"></div>
        <div class="flashcard-en" id="flashEn" hidden></div>
        <div class="flashcard-hint" id="flashHint">tap to reveal</div>
      </div>
      <div class="flash-actions" id="flashActions" hidden>
        <button class="flash-btn primary" id="gotItBtn">Got it ✓</button>
        <button class="flash-btn" id="tryAgainBtn">Try again ↺</button>
      </div>
    </div>

    <!-- ── Result screen ─────────────────────────────────────────── -->
    <div id="resultScreen" hidden>
      <div class="result-score" id="resultScore"></div>
      <p class="result-label" id="resultLabel"></p>
      <p class="missed-section-label" id="missedLabel"></p>
      <div class="missed-list" id="missedList"></div>
      <div class="result-actions">
        <button class="result-btn primary" id="retryBtn">Try again</button>
        <button class="result-btn" id="newSelBtn">New selection</button>
      </div>
    </div>

  </main>

  <footer>
    <span>© A. M. Alcazar</span>
    <a href="mailto:hello@moviemarginalia.com">2026</a>
  </footer>

  <script>
    // ── Vocabulary data ────────────────────────────────────────────────────────
    // Add new lessons by appending objects with the next lesson number.
    const VOCAB = [
      // Lesson 1 — Greetings
      { lesson: 1, jp: "こんにちは",       romaji: "konnichiwa",        en: "Hello" },
      { lesson: 1, jp: "おはようございます", romaji: "ohayou gozaimasu",  en: "Good morning" },
      { lesson: 1, jp: "こんばんは",        romaji: "konbanwa",           en: "Good evening" },
      { lesson: 1, jp: "さようなら",        romaji: "sayounara",          en: "Goodbye" },
      { lesson: 1, jp: "ありがとう",        romaji: "arigatou",           en: "Thank you" },
      { lesson: 1, jp: "どういたしまして",  romaji: "dou itashimashite",  en: "You're welcome" },
      { lesson: 1, jp: "はい",             romaji: "hai",                en: "Yes" },
      { lesson: 1, jp: "いいえ",           romaji: "iie",                en: "No" },
      { lesson: 1, jp: "すみません",        romaji: "sumimasen",          en: "Excuse me" },
      { lesson: 1, jp: "ごめんなさい",      romaji: "gomen nasai",        en: "I'm sorry" },

      // Lesson 2 — Self-Introduction
      { lesson: 2, jp: "わたし",           romaji: "watashi",            en: "I / me" },
      { lesson: 2, jp: "あなた",           romaji: "anata",              en: "You" },
      { lesson: 2, jp: "なまえ",           romaji: "namae",              en: "Name" },
      { lesson: 2, jp: "はじめまして",     romaji: "hajimemashite",      en: "Nice to meet you" },
      { lesson: 2, jp: "どうぞよろしく",   romaji: "douzo yoroshiku",    en: "Pleased to meet you" },
      { lesson: 2, jp: "です",             romaji: "desu",               en: "Is / am / are" },
      { lesson: 2, jp: "にほんご",         romaji: "nihongo",            en: "Japanese language" },
      { lesson: 2, jp: "えいご",           romaji: "eigo",               en: "English language" },
      { lesson: 2, jp: "がくせい",         romaji: "gakusei",            en: "Student" },
      { lesson: 2, jp: "せんせい",         romaji: "sensei",             en: "Teacher" },

      // Lesson 3 — Numbers 1–10
      { lesson: 3, jp: "いち",   romaji: "ichi",   en: "One" },
      { lesson: 3, jp: "に",     romaji: "ni",     en: "Two" },
      { lesson: 3, jp: "さん",   romaji: "san",    en: "Three" },
      { lesson: 3, jp: "よん",   romaji: "yon",    en: "Four" },
      { lesson: 3, jp: "ご",     romaji: "go",     en: "Five" },
      { lesson: 3, jp: "ろく",   romaji: "roku",   en: "Six" },
      { lesson: 3, jp: "なな",   romaji: "nana",   en: "Seven" },
      { lesson: 3, jp: "はち",   romaji: "hachi",  en: "Eight" },
      { lesson: 3, jp: "きゅう", romaji: "kyuu",   en: "Nine" },
      { lesson: 3, jp: "じゅう", romaji: "juu",    en: "Ten" },

      // Lesson 4 — Family
      { lesson: 4, jp: "かぞく",     romaji: "kazoku",    en: "Family" },
      { lesson: 4, jp: "おかあさん", romaji: "okaasan",   en: "Mother" },
      { lesson: 4, jp: "おとうさん", romaji: "otousan",   en: "Father" },
      { lesson: 4, jp: "おにいさん", romaji: "oniisan",   en: "Older brother" },
      { lesson: 4, jp: "おねえさん", romaji: "oneesan",   en: "Older sister" },
      { lesson: 4, jp: "おとうと",   romaji: "otouto",    en: "Younger brother" },
      { lesson: 4, jp: "いもうと",   romaji: "imouto",    en: "Younger sister" },
      { lesson: 4, jp: "そふ",       romaji: "sofu",      en: "Grandfather" },
      { lesson: 4, jp: "そぼ",       romaji: "sobo",      en: "Grandmother" },
      { lesson: 4, jp: "こども",     romaji: "kodomo",    en: "Child" },

      // Lesson 5 — Food & Drink
      { lesson: 5, jp: "たべもの", romaji: "tabemono", en: "Food" },
      { lesson: 5, jp: "のみもの", romaji: "nomimono", en: "Drink" },
      { lesson: 5, jp: "みず",     romaji: "mizu",     en: "Water" },
      { lesson: 5, jp: "ごはん",   romaji: "gohan",    en: "Rice / meal" },
      { lesson: 5, jp: "おちゃ",   romaji: "ocha",     en: "Tea" },
      { lesson: 5, jp: "コーヒー", romaji: "koohii",   en: "Coffee" },
      { lesson: 5, jp: "パン",     romaji: "pan",      en: "Bread" },
      { lesson: 5, jp: "にく",     romaji: "niku",     en: "Meat" },
      { lesson: 5, jp: "さかな",   romaji: "sakana",   en: "Fish" },
      { lesson: 5, jp: "やさい",   romaji: "yasai",    en: "Vegetables" },

      // Lessons 6–25: add vocabulary below as you progress through the course.
    ];

    // ── Constants & state ──────────────────────────────────────────────────────
    const STORAGE_KEY = 'jp_course1_maxLesson';
    const Q_COUNT = 10;

    const availableLessons = [...new Set(VOCAB.map(v => v.lesson))].sort((a, b) => a - b);
    const lessonMax = availableLessons[availableLessons.length - 1];

    let maxLesson = Math.min(parseInt(localStorage.getItem(STORAGE_KEY)) || 1, lessonMax);
    let mode = 'mc';
    let showRomaji = true;
    let questions = [];
    let currentQ = 0;
    let score = 0;
    let missed = [];
    let flashRevealed = false;

    // ── Lesson selector ────────────────────────────────────────────────────────
    const lessonSelect = document.getElementById('lessonSelect');
    availableLessons.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n;
      opt.textContent = `Lesson ${n}`;
      if (n === maxLesson) opt.selected = true;
      lessonSelect.appendChild(opt);
    });
    lessonSelect.addEventListener('change', () => {
      maxLesson = parseInt(lessonSelect.value);
      localStorage.setItem(STORAGE_KEY, maxLesson);
      updatePoolInfo();
    });

    function updatePoolInfo() {
      const pool = getPool();
      const lessons = [...new Set(pool.map(v => v.lesson))].length;
      const q = Math.min(Q_COUNT, pool.length);
      document.getElementById('poolInfo').textContent =
        `${q} question${q !== 1 ? 's' : ''} · ${pool.length} word${pool.length !== 1 ? 's' : ''} · ${lessons} lesson${lessons !== 1 ? 's' : ''}`;
      document.getElementById('startBtn').disabled = pool.length < 2;
    }
    updatePoolInfo();

    // ── Mode & romaji toggles ──────────────────────────────────────────────────
    document.getElementById('mcBtn').addEventListener('click', () => setMode('mc'));
    document.getElementById('flashBtn').addEventListener('click', () => setMode('flash'));
    document.getElementById('romajiOnBtn').addEventListener('click', () => setRomaji(true));
    document.getElementById('romajiOffBtn').addEventListener('click', () => setRomaji(false));

    function setMode(m) {
      mode = m;
      document.getElementById('mcBtn').classList.toggle('active', m === 'mc');
      document.getElementById('flashBtn').classList.toggle('active', m === 'flash');
    }
    function setRomaji(on) {
      showRomaji = on;
      document.getElementById('romajiOnBtn').classList.toggle('active', on);
      document.getElementById('romajiOffBtn').classList.toggle('active', !on);
    }

    // ── Utilities ──────────────────────────────────────────────────────────────
    function getPool() { return VOCAB.filter(v => v.lesson <= maxLesson); }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function showOnly(id) {
      ['startScreen', 'quizScreenMC', 'quizScreenFlash', 'resultScreen'].forEach(s => {
        document.getElementById(s).hidden = s !== id;
      });
    }

    // ── Start / restart ────────────────────────────────────────────────────────
    document.getElementById('startBtn').addEventListener('click', startQuiz);
    document.getElementById('retryBtn').addEventListener('click', startQuiz);
    document.getElementById('newSelBtn').addEventListener('click', () => showOnly('startScreen'));

    function startQuiz() {
      const pool = getPool();
      questions = shuffle(pool).slice(0, Math.min(Q_COUNT, pool.length));
      currentQ = 0;
      score = 0;
      missed = [];
      if (mode === 'mc') {
        showOnly('quizScreenMC');
        renderMC();
      } else {
        showOnly('quizScreenFlash');
        renderFlash();
      }
    }

    // ── Multiple choice ────────────────────────────────────────────────────────
    function renderMC() {
      const pool = getPool();
      const q = questions[currentQ];
      const total = questions.length;

      document.getElementById('mcProgress').textContent = `${currentQ + 1} / ${total}`;
      document.getElementById('mcScore').textContent = `${score} correct`;
      document.getElementById('mcFill').style.width = `${(currentQ / total) * 100}%`;
      document.getElementById('mcJp').textContent = q.jp;

      const romEl = document.getElementById('mcRomaji');
      romEl.textContent = showRomaji ? q.romaji : '';
      romEl.hidden = !showRomaji;

      const pool2 = pool.filter(v => v.en !== q.en);
      const wrongs = shuffle(pool2).slice(0, 3);
      const options = shuffle([q, ...wrongs]);

      const grid = document.getElementById('mcOptions');
      grid.innerHTML = '';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.textContent = opt.en;
        btn.addEventListener('click', () => handleMC(btn, opt.en === q.en, q));
        grid.appendChild(btn);
      });
    }

    function handleMC(clicked, correct, q) {
      document.querySelectorAll('.answer-btn').forEach(b => {
        b.disabled = true;
        if (b.textContent === q.en) b.classList.add('correct');
      });
      if (correct) {
        score++;
      } else {
        clicked.classList.add('wrong');
        missed.push(q);
      }
      document.getElementById('mcScore').textContent = `${score} correct`;
      setTimeout(() => {
        currentQ++;
        currentQ < questions.length ? renderMC() : showResults();
      }, 1200);
    }

    // ── Flashcard ──────────────────────────────────────────────────────────────
    function renderFlash() {
      const q = questions[currentQ];
      const total = questions.length;
      flashRevealed = false;

      document.getElementById('flashProgress').textContent = `${currentQ + 1} / ${total}`;
      document.getElementById('flashScore').textContent = `${score} correct`;
      document.getElementById('flashFill').style.width = `${(currentQ / total) * 100}%`;
      document.getElementById('flashJp').textContent = q.jp;

      const romEl = document.getElementById('flashRomaji');
      romEl.textContent = showRomaji ? q.romaji : '';
      romEl.hidden = !showRomaji;

      document.getElementById('flashEn').textContent = q.en;
      document.getElementById('flashEn').hidden = true;
      document.getElementById('flashHint').hidden = false;
      document.getElementById('flashActions').hidden = true;

      const card = document.getElementById('flashCard');
      card.classList.remove('revealed');
    }

    document.getElementById('flashCard').addEventListener('click', () => {
      if (flashRevealed) return;
      flashRevealed = true;
      document.getElementById('flashEn').hidden = false;
      document.getElementById('flashHint').hidden = true;
      document.getElementById('flashActions').hidden = false;
      document.getElementById('flashCard').classList.add('revealed');
    });

    document.getElementById('gotItBtn').addEventListener('click', () => rateFlash(true));
    document.getElementById('tryAgainBtn').addEventListener('click', () => rateFlash(false));

    function rateFlash(gotIt) {
      if (gotIt) score++;
      else missed.push(questions[currentQ]);
      document.getElementById('flashScore').textContent = `${score} correct`;
      currentQ++;
      currentQ < questions.length ? renderFlash() : showResults();
    }

    // ── Results ────────────────────────────────────────────────────────────────
    function showResults() {
      showOnly('resultScreen');
      const total = questions.length;
      document.getElementById('resultScore').textContent = `${score} / ${total}`;
      document.getElementById('resultLabel').textContent =
        score === total        ? 'Perfect!' :
        score >= total * 0.8   ? 'Great work.' :
        score >= total * 0.6   ? 'Good effort.' : 'Keep practicing.';

      const missedList = document.getElementById('missedList');
      const missedLabel = document.getElementById('missedLabel');
      missedList.innerHTML = '';

      if (missed.length === 0) {
        missedList.hidden = true;
        missedLabel.hidden = true;
      } else {
        missedList.hidden = false;
        missedLabel.hidden = false;
        missedLabel.textContent = `Missed — ${missed.length} word${missed.length !== 1 ? 's' : ''}`;
        missed.forEach(item => {
          const row = document.createElement('div');
          row.className = 'missed-item';
          row.innerHTML = `
            <span class="missed-jp">${item.jp}</span>
            <span class="missed-romaji">${item.romaji}</span>
            <span class="missed-en">${item.en}</span>
          `;
          missedList.appendChild(row);
        });
      }
    }
  </script>
  <script src="/scripts/theme.js"></script>
</body>
</html>
