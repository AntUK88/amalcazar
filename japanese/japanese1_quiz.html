
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語 Quiz — Level 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --aged: #e8dfc8;
    --red: #c0392b;
    --red-soft: #e8b4b0;
    --green: #2d6a4f;
    --green-soft: #b7d9c8;
    --muted: #8a7f72;
    --border: #c8bfb0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  header h1 span {
    color: var(--red);
  }

  header p {
    margin-top: 8px;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* SCREEN SELECTOR */
  #screen-selector {
    width: 100%;
    max-width: 680px;
  }

  .selector-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .lesson-card {
    border: 1.5px solid var(--border);
    background: var(--aged);
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .lesson-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--red);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s ease;
  }

  .lesson-card:hover::before,
  .lesson-card.active::before {
    transform: scaleX(1);
  }

  .lesson-card:hover,
  .lesson-card.active {
    border-color: var(--ink);
    background: #ede8d8;
  }

  .lesson-card .lesson-num {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .lesson-card .lesson-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.3;
  }

  .lesson-card .lesson-count {
    margin-top: 8px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .start-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 14px 32px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-primary:hover { background: var(--red); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .quiz-mode-toggle {
    display: flex;
    border: 1.5px solid var(--border);
    overflow: hidden;
  }

  .quiz-mode-toggle button {
    background: none;
    border: none;
    padding: 10px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    color: var(--muted);
    border-right: 1px solid var(--border);
    transition: all 0.15s;
  }

  .quiz-mode-toggle button:last-child { border-right: none; }
  .quiz-mode-toggle button.active {
    background: var(--ink);
    color: var(--paper);
  }

  /* QUIZ SCREEN */
  #screen-quiz {
    width: 100%;
    max-width: 640px;
    display: none;
  }

  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }

  .quiz-progress {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    flex: 1;
    margin: 0 16px;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--red);
    transition: width 0.3s ease;
  }

  .btn-back {
    background: none;
    border: 1.5px solid var(--border);
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }

  .btn-back:hover { border-color: var(--ink); color: var(--ink); }

  .question-card {
    border: 1.5px solid var(--border);
    background: var(--aged);
    padding: 40px 36px;
    margin-bottom: 20px;
    animation: fadeSlide 0.25s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-tag {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .question-text {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .question-hint {
    font-size: 0.78rem;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 32px;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  @media (max-width: 500px) {
    .options-grid { grid-template-columns: 1fr; }
  }

  .option-btn {
    border: 1.5px solid var(--border);
    background: var(--paper);
    padding: 14px 16px;
    text-align: left;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--ink);
    background: #ede8d8;
  }

  .option-btn.correct {
    border-color: var(--green);
    background: var(--green-soft);
    color: var(--green);
  }

  .option-btn.wrong {
    border-color: var(--red);
    background: var(--red-soft);
    color: var(--red);
    text-decoration: line-through;
  }

  .option-btn.reveal {
    border-color: var(--green);
    background: var(--green-soft);
    color: var(--green);
  }

  .feedback-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
  }

  .feedback-msg {
    font-family: 'Shippori Mincho', serif;
    font-size: 1rem;
    font-weight: 600;
  }

  .feedback-msg.correct { color: var(--green); }
  .feedback-msg.wrong { color: var(--red); }

  .feedback-note {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.5;
  }

  .btn-next {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 12px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn-next:hover { background: var(--red); }

  /* RESULTS */
  #screen-results {
    width: 100%;
    max-width: 600px;
    display: none;
    text-align: center;
  }

  .result-score {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 800;
    line-height: 1;
    color: var(--red);
  }

  .result-label {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 8px;
    margin-bottom: 32px;
  }

  .result-breakdown {
    border: 1.5px solid var(--border);
    background: var(--aged);
    padding: 24px;
    margin-bottom: 32px;
    text-align: left;
  }

  .result-breakdown h3 {
    font-family: 'Shippori Mincho', serif;
    font-weight: 600;
    margin-bottom: 16px;
    font-size: 1.1rem;
  }

  .breakdown-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    gap: 12px;
  }

  .breakdown-item:last-child { border-bottom: none; }

  .breakdown-q { color: var(--muted); flex: 1; }
  .breakdown-a { font-weight: 500; }
  .breakdown-status { font-size: 0.9rem; flex-shrink: 0; }

  .result-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
</style>
</head>
<body>

<header>
  <h1>日本語 <span>Quiz</span></h1>
  <p>JapanesePod101 · Level 1 · Lessons 1–25</p>
</header>

<!-- SELECTOR -->
<div id="screen-selector">

  <div class="selector-grid" id="lesson-cards"></div>

  <div class="start-row">
    <div class="quiz-mode-toggle">
      <button class="active" data-mode="multiple" onclick="setMode(this,'multiple')">Multiple choice</button>
      <button data-mode="flashcard" onclick="setMode(this,'flashcard')">Flashcard</button>
    </div>
    <button class="btn-primary" id="btn-start" onclick="startQuiz()">Start quiz →</button>
  </div>
</div>

<!-- QUIZ -->
<div id="screen-quiz">
  <div class="quiz-header">
    <span class="quiz-progress" id="q-counter">1 / 10</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <button class="btn-back" onclick="goHome()">← back</button>
  </div>

  <div class="question-card" id="question-card">
    <div class="question-tag" id="q-tag"></div>
    <div class="question-text" id="q-text"></div>
    <div class="question-hint" id="q-hint"></div>
    <div class="options-grid" id="options-grid"></div>
    <div id="feedback-area" style="display:none;margin-top:20px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px">
        <div>
          <div class="feedback-msg" id="feedback-msg"></div>
          <div class="feedback-note" id="feedback-note"></div>
        </div>
        <button class="btn-next" onclick="nextQuestion()">Next →</button>
      </div>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div id="screen-results">
  <div class="result-score" id="result-score"></div>
  <div class="result-label" id="result-label"></div>
  <div class="result-breakdown" id="result-breakdown"></div>
  <div class="result-actions">
    <button class="btn-primary" onclick="retryQuiz()">Retry same set</button>
    <button class="btn-primary" style="background:var(--muted)" onclick="goHome()">New selection</button>
  </div>
</div>

<script>
// ─── DATABASE ───────────────────────────────────────────────────────────────

const LESSONS = [
  {
    id: 1,
    title: "Self Introduction",
    subtitle: "Basic Bootcamp #1",
    vocab: [
      { romaji: "kon'nichi wa", english: "hello", note: "Used any time of day as a general greeting." },
      { romaji: "watashi", english: "I / me", note: "The standard first-person pronoun." },
      { romaji: "hajimemashite", english: "Nice to meet you", note: "Only used when meeting someone for the first time." },
      { romaji: "yoroshiku onegai shimasu", english: "Please be kind to me / Pleased to meet you", note: "Literally 'please look favorably upon me'." },
      { romaji: "desu", english: "is / am / are (copula)", note: "Always comes at the end of a sentence." },

    grammar: [

      { point: "Adding -san after someone's name", english: "Shows respect. Never use it for yourself!", note: "e.g. Tanaka-san." },
      { point: "Japanese name order", english: "Last name comes before first name.", note: "Taro Tanaka becomes Tanaka Taro in Japanese." },
    ]
  },
  {
    id: 2,

      { romaji: "Nihon", english: "Japan", note: "" },
      { romaji: "Nihon-jin", english: "Japanese person", note: "-jin means 'person of [country]'." },
      { romaji: "Amerika", english: "America", note: "" },
      { romaji: "Amerika-jin", english: "American person", note: "" },
      { romaji: "Igirisu", english: "England / Britain", note: "" },
      { romaji: "Igirisu-jin", english: "British person", note: "" },
      { romaji: "watashi-tachi", english: "we / us", note: "-tachi is the plural suffix." },
      { romaji: "anata", english: "you", note: "Can be dropped when context is clear." },
    ],
    grammar: [
      { point: "[Country]-jin desu", english: "I am [nationality].", note: "Watashi wa can be dropped if already understood." },
      { point: "Anata wa nihon-jin desu.", english: "You are Japanese.", note: "" },
    ]
  },
  {
    id: 3,
    title: "Useful Learning Phrases",
    subtitle: "Basic Bootcamp #3",
    vocab: [
      { romaji: "sumimasen", english: "Excuse me / I'm sorry", note: "Also used to thank someone for their trouble." },
      { romaji: "onegai shimasu", english: "Please", note: "Used when requesting a favour or object." },
      { romaji: "yukkuri", english: "slowly", note: "yukkuri onegai shimasu = please speak slowly." },
      { romaji: "mo ichi-do", english: "one more time", note: "Mo ichi-do onegai shimasu = please say that again." },
      { romaji: "Nihon-go", english: "Japanese (language)", note: "go = language." },
      { romaji: "Eigo", english: "English (language)", note: "" },
      { romaji: "nan desu ka", english: "What is it? / What is this called?", note: "[word] wa Nihon-go de nan desu ka? = How do you say [word] in Japanese?" },

    grammar: [
      { point: "[word] wa Nihon-go de nan desu ka?", english: "How do you say [word] in Japanese?", note: "de = in (the language of)." },
      { point: "Eigo de nan desu ka?", english: "What is it in English?", note: "" },
    ]
  },
  {
    id: 4,
    title: "Numbers 0–100",
    subtitle: "Basic Bootcamp #4",
    vocab: [
      { romaji: "zero / rei", english: "0", note: "Both forms are used." },
      { romaji: "ichi", english: "1", note: "" },
      { romaji: "ni", english: "2", note: "" },
      { romaji: "san", english: "3", note: "" },
      { romaji: "shi / yon", english: "4", note: "shi sounds like 'death' so yon is preferred." },
      { romaji: "go", english: "5", note: "" },
      { romaji: "roku", english: "6", note: "" },
      { romaji: "shichi / nana", english: "7", note: "" },
      { romaji: "hachi", english: "8", note: "Lucky — the kanji broadens out like growing prosperity." },
      { romaji: "ku / kyuu", english: "9", note: "ku sounds like 'suffering' so kyuu is preferred." },
      { romaji: "juu", english: "10", note: "" },
      { romaji: "juu-ichi", english: "11", note: "juu + ichi" },
      { romaji: "ni-juu", english: "20", note: "" },
      { romaji: "hyaku", english: "100", note: "" },
    ],
    grammar: [
      { point: "11–19: juu + [digit]", english: "e.g. juu-san = 13", note: "" },
      { point: "Multiples of 10: [digit] + juu", english: "e.g. san-juu = 30", note: "" },
      { point: "4 (shi) and 9 (ku) are considered unlucky", english: "Avoided in hospitals and apartment buildings.", note: "" },
    ]
  },
  {
    id: 5,
    title: "Numbers 100–100,000",
    subtitle: "Basic Bootcamp #5",
    vocab: [
      { romaji: "hyaku", english: "100", note: "" },
      { romaji: "ni-hyaku", english: "200", note: "" },
      { romaji: "san-byaku", english: "300", note: "Sound change: san + hyaku → san-byaku" },
      { romaji: "ro-ppyaku", english: "600", note: "Irregular — note the double p." },
      { romaji: "ha-ppyaku", english: "800", note: "Irregular — note the double p." },
      { romaji: "sen", english: "1,000", note: "" },
      { romaji: "ni-sen", english: "2,000", note: "" },
      { romaji: "san-zen", english: "3,000", note: "Sound change: san + sen → san-zen" },
      { romaji: "ha-ssen", english: "8,000", note: "Irregular double s." },
      { romaji: "ichi-man", english: "10,000", note: "man = ten thousand unit (unique to Japanese/Chinese counting)." },
      { romaji: "hyaku-man", english: "1,000,000", note: "" },

    grammar: [
      { point: "[digit] + hyaku = hundreds", english: "e.g. go-hyaku = 500", note: "Watch for san-byaku, ro-ppyaku, ha-ppyaku." },

  {
    id: 6,
    title: "Top 5 Must-Know Phrases",
    subtitle: "All About #5",
    vocab: [

      { romaji: "douzo", english: "Please go ahead / Here you go", note: "Use when offering something or letting someone pass." },
      { romaji: "o-negai shimasu", english: "Please (request/favour)", note: "Use when asking for something tangible or a service." },
      { romaji: "hai", english: "Yes / Right / Here you go / Pardon?", note: "Rising intonation (hai?) = 'Excuse me?' or 'Pardon?'" },
      { romaji: "arigato gozaimasu", english: "Thank you very much (formal)", note: "" },
    ],
    grammar: []
  },
  {
    id: 7,
    title: "Classroom Phrases",
    subtitle: "All About #12",
    vocab: [
      { romaji: "itte kudasai", english: "Please say it / Please repeat.", note: "" },
      { romaji: "mite kudasai", english: "Please look.", note: "" },
      { romaji: "yonde kudasai", english: "Please read.", note: "" },
      { romaji: "kaite kudasai", english: "Please write it.", note: "" },
      { romaji: "wakarimasu ka?", english: "Do you understand?", note: "" },
      { romaji: "shitsumon arimasu ka?", english: "Are there any questions?", note: "" },
      { romaji: "ii desu ka?", english: "Is it okay? / Is everything alright?", note: "Teachers use this to confirm understanding." },
    ],
    grammar: [
      { point: "[verb] + kudasai", english: "Please [do verb].", note: "kudasai makes a polite request." },
    ]
  },
  {
    id: 8,
    title: "Slang & Expressions",
    subtitle: "All About #13",
    vocab: [
      { romaji: "sugoi", english: "Wow / Amazing / Great", note: "Very common exclamation." },
      { romaji: "baka", english: "Idiot / Fool (noun); stupid (adj: baka na)", note: "Can be playful or insulting depending on context." },
      { romaji: "uso!", english: "No way! / Really?!", note: "Literally 'lie', used to express surprise." },
      { romaji: "chotto", english: "A little / Hmm / Just a moment", note: "Also used as polite refusal: chotto... (trailing off)." },

      { romaji: "maji", english: "Seriously / Really?", note: "Maji de?! = 'Are you serious?!'" },
      { romaji: "ne / un", english: "Yeah / I know (agreement)", note: "Aizuchi — interjections to show you're listening." },
      { romaji: "hee", english: "Oh! / Whoa! (impressed or surprised)", note: "Aizuchi." },
    ],
    grammar: []
  },
  {
    id: 9,
    title: "Common Mistakes to Avoid",
    subtitle: "All About #14",
    vocab: [
      { romaji: "kirei", english: "pretty / beautiful", note: "NOT to be confused with kirai (hated)." },
      { romaji: "kirai", english: "hated / disliked", note: "" },
      { romaji: "kawaii", english: "cute", note: "NOT to be confused with kowai (scary)." },
      { romaji: "kowai", english: "scary", note: "" },
      { romaji: "hiroi", english: "spacious / wide", note: "NOT to be confused with hidoi (terrible)." },
      { romaji: "hidoi", english: "terrible / cruel", note: "" },
      { romaji: "sensei", english: "teacher", note: "Long vowel — sens-ee, not sen-sei as two separate sounds." },
    ],
    grammar: [

      { point: "Long vowels change meaning", english: "o-ba-san (aunt) vs o-baa-san (grandmother)", note: "o-ji-san (uncle) vs o-jii-san (grandfather)" },
      { point: "Politeness levels", english: "Use formal speech with teachers, elders, and senpai.", note: "Informal speech with friends only." },
    ]
  },
  {
    id: 10,
    title: "Grammar Concepts",
    subtitle: "All About #3 — Core Grammar",
    vocab: [
      { romaji: "wa", english: "topic-marking particle", note: "Marks what the sentence is ABOUT. 'As for X...'." },
      { romaji: "ka", english: "question particle", note: "Added to the end of a sentence to make it a question." },

    grammar: [

      { point: "No verb conjugation for person", english: "ikimasu works for I/you/he/we/they.", note: "Huge advantage over English and Romance languages." },
      { point: "Questions: add ka to the end", english: "Kare wa gakusei desu. → Kare wa gakusei desu ka?", note: "No word-order change needed." },
      { point: "Subjects are often dropped when understood", english: "Context makes the subject clear — stating it every time sounds unnatural.", note: "" },
    ]
  },
];

// ─── STATE ──────────────────────────────────────────────────────────────────

let selectedLessons = new Set([1]);
let quizMode = 'multiple'; // 'multiple' or 'flashcard'
let questions = [];
let currentQ = 0;
let answers = [];
let answered = false;

// ─── SELECTOR SCREEN ────────────────────────────────────────────────────────

function buildSelector() {
  const grid = document.getElementById('lesson-cards');
  grid.innerHTML = '';
  LESSONS.forEach(l => {
    const total = l.vocab.length + l.grammar.length;
    const div = document.createElement('div');
    div.className = 'lesson-card' + (selectedLessons.has(l.id) ? ' active' : '');
    div.innerHTML = `
      <div class="lesson-num">Lesson ${l.id}</div>
      <div class="lesson-title">${l.title}</div>
      <div class="lesson-count">${total} items</div>
    `;
    div.addEventListener('click', () => toggleLesson(l.id, div));
    grid.appendChild(div);
  });
}

function toggleLesson(id, el) {
  if (selectedLessons.has(id)) {
    if (selectedLessons.size === 1) return; // keep at least one
    selectedLessons.delete(id);
    el.classList.remove('active');
  } else {
    selectedLessons.add(id);
    el.classList.add('active');
  }
}

function setMode(btn, mode) {
  document.querySelectorAll('.quiz-mode-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  quizMode = mode;
}

// ─── QUIZ GENERATION ────────────────────────────────────────────────────────

function buildQuestions() {
  const pool = [];
  LESSONS.filter(l => selectedLessons.has(l.id)).forEach(l => {
    l.vocab.forEach(v => {
      pool.push({ type: 'vocab', question: v.romaji, answer: v.english, note: v.note, lesson: l.id });
      pool.push({ type: 'vocab_reverse', question: v.english, answer: v.romaji, note: v.note, lesson: l.id });
    });
    l.grammar.forEach(g => {
      pool.push({ type: 'grammar', question: g.point, answer: g.english, note: g.note, lesson: l.id });
    });
  });
  // Shuffle and cap
  shuffle(pool);
  return pool.slice(0, Math.min(pool.length, 15));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function buildDistractors(correct, allQuestions, currentIndex) {
  const allAnswers = allQuestions.map(q => q.answer).filter(a => a !== correct);
  // Also pull from all vocab for more variety
  const extras = [];
  LESSONS.forEach(l => {
    l.vocab.forEach(v => { extras.push(v.english); extras.push(v.romaji); });
    l.grammar.forEach(g => { extras.push(g.english); });
  });
  const pool = [...new Set([...allAnswers, ...extras])].filter(a => a !== correct);
  shuffle(pool);
  const distractors = pool.slice(0, 3);
  const options = [correct, ...distractors];
  shuffle(options);
  return options;
}

// ─── START / NAVIGATION ─────────────────────────────────────────────────────

function startQuiz() {
  questions = buildQuestions();
  answers = [];
  currentQ = 0;
  answered = false;

  document.getElementById('screen-selector').style.display = 'none';
  document.getElementById('screen-results').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';

  renderQuestion();
}

function goHome() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-results').style.display = 'none';
  document.getElementById('screen-selector').style.display = 'block';
}

function retryQuiz() {
  document.getElementById('screen-results').style.display = 'none';
  startQuiz();
}

// ─── RENDER ─────────────────────────────────────────────────────────────────

function renderQuestion() {
  answered = false;
  const q = questions[currentQ];
  const total = questions.length;

  document.getElementById('q-counter').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(currentQ / total) * 100}%`;

  const typeLabel = q.type === 'vocab' ? 'Romaji → English'
    : q.type === 'vocab_reverse' ? 'English → Romaji'
    : 'Grammar';
  document.getElementById('q-tag').textContent = `Lesson ${q.lesson} · ${typeLabel}`;
  document.getElementById('q-text').textContent = q.question;
  document.getElementById('q-hint').textContent = q.type === 'vocab_reverse'
    ? 'Give the romaji.' : q.type === 'vocab' ? 'What does this mean?' : 'What does this mean in English?';

  document.getElementById('feedback-area').style.display = 'none';
  document.getElementById('feedback-msg').textContent = '';
  document.getElementById('feedback-note').textContent = '';

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';

  if (quizMode === 'flashcard') {
    grid.style.gridTemplateColumns = '1fr';
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = 'Tap to reveal answer';
    btn.onclick = () => revealFlashcard(q, btn);
    grid.appendChild(btn);
  } else {
    grid.style.gridTemplateColumns = '';
    const options = buildDistractors(q.answer, questions, currentQ);
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => handleAnswer(opt, q, options);
      grid.appendChild(btn);
    });
  }
}

function handleAnswer(chosen, q, options) {
  if (answered) return;
  answered = true;
  const correct = chosen === q.answer;
  answers.push({ question: q.question, correct: q.answer, chosen, isCorrect: correct });

  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === q.answer) btn.classList.add('correct');
    else if (btn.textContent === chosen && !correct) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback-area');
  fb.style.display = 'block';
  const msg = document.getElementById('feedback-msg');
  msg.textContent = correct ? '✓ Correct' : '✗ Wrong';
  msg.className = 'feedback-msg ' + (correct ? 'correct' : 'wrong');
  if (q.note) {
    document.getElementById('feedback-note').textContent = q.note;
  } else {
    document.getElementById('feedback-note').textContent = correct ? '' : `Correct answer: ${q.answer}`;
  }
}

function revealFlashcard(q, btn) {
  if (answered) return;
  answered = true;
  btn.textContent = q.answer;
  btn.classList.add('reveal');
  btn.disabled = true;

  const fb = document.getElementById('feedback-area');
  fb.style.display = 'block';
  const msg = document.getElementById('feedback-msg');
  msg.textContent = q.note || '';
  msg.className = 'feedback-msg';
  document.getElementById('feedback-note').textContent = '';
  answers.push({ question: q.question, correct: q.answer, chosen: q.answer, isCorrect: true });
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResults();
  } else {
    document.getElementById('question-card').style.animation = 'none';
    requestAnimationFrame(() => {
      document.getElementById('question-card').style.animation = '';
      renderQuestion();
    });
  }
}

// ─── RESULTS ────────────────────────────────────────────────────────────────

function showResults() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-results').style.display = 'block';

  const correct = answers.filter(a => a.isCorrect).length;
  const total = answers.length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('result-score').textContent = `${pct}%`;
  const label = pct === 100 ? '完璧！ Perfect score!' : pct >= 80 ? 'よくできました — Well done!' : pct >= 60 ? 'まあまあ — Not bad.' : 'もっと練習 — Keep practising.';
  document.getElementById('result-label').textContent = `${correct} / ${total} correct · ${label}`;

  const bd = document.getElementById('result-breakdown');
  bd.innerHTML = '<h3>Review</h3>';
  answers.forEach(a => {
    const row = document.createElement('div');
    row.className = 'breakdown-item';
    row.innerHTML = `
      <span class="breakdown-q">${a.question}</span>
      <span class="breakdown-a">${a.correct}</span>
      <span class="breakdown-status">${a.isCorrect ? '✓' : '✗'}</span>
    `;
    bd.appendChild(row);
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────

buildSelector();
</script>
