<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photography — A. M. Alcazar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #fff7ed; --ink: #1a1814; --muted: #8a8478; --rule: #d8d2c8; }
    html, body { background: var(--bg); color: var(--ink); font-family: 'EB Garamond', Georgia, serif; min-height: 100vh; }
    body { display: flex; flex-direction: column; }

    header {
      padding: 0 3rem;
      height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--rule);
    }
    .site-name { font-family: 'EB Garamond', Georgia, serif; font-weight: 400; font-size: 1rem; letter-spacing: 0.06em; color: var(--ink); text-decoration: none; }
    nav { display: flex; gap: 2rem; align-items: center; }
    nav a { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    nav a:hover, nav a.active { color: var(--ink); }

    .photo-wrap { flex: 1; padding: 2rem 1rem 4rem; }
    .photo-footnote { margin-top: 2.5rem; font-size: 0.85rem; letter-spacing: 0.05em; color: var(--muted); font-style: italic; text-align: center; }

    .photo-grid {
      columns: 3 240px;
      column-gap: 1rem;
    }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 1rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .photo-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: opacity 0.2s;
    }

    .photo-item:hover img { opacity: 0.88; }

    .photo-hover {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0.5rem 0.75rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.5));
      color: #fff;
      font-size: 0.78rem;
      font-style: italic;
      font-family: 'EB Garamond', Georgia, serif;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .photo-item:hover .photo-hover { opacity: 1; }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,24,20,0.93);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
    }
    .lightbox.open { display: flex; }

    .lightbox-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 93vw;
      max-height: 93vh;
    }

    .lightbox-img {
      width: auto;
      height: auto;
      max-width: 93vw;
      max-height: 85vh;
      object-fit: contain;
      display: block;
    }

    .lightbox-info {
      margin-top: 1rem;
      text-align: center;
      color: #e8e2d9;
      font-family: 'EB Garamond', Georgia, serif;
      max-width: 560px;
    }

    .lb-description { font-size: 1rem; line-height: 1.6; margin-bottom: 0.35rem; }
    .lb-notes { font-size: 0.8rem; color: rgba(232,226,217,0.55); font-style: italic; }

    .lightbox-close {
      position: fixed; top: 1.25rem; right: 1.5rem;
      background: none; border: none; color: #fff;
      font-size: 2rem; cursor: pointer; opacity: 0.6; transition: opacity 0.2s;
    }
    .lightbox-close:hover { opacity: 1; }

    .lightbox-prev, .lightbox-next {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #fff;
      font-size: 2.5rem; cursor: pointer; opacity: 0.4;
      transition: opacity 0.2s; padding: 0.5rem 1rem; line-height: 1;
    }
    .lightbox-prev { left: 0.5rem; }
    .lightbox-next { right: 0.5rem; }
    .lightbox-prev:hover, .lightbox-next:hover { opacity: 1; }

    .empty-state {
      text-align: center;
      padding: 6rem 2rem;
      font-size: 1rem;
      color: var(--muted);
      font-style: italic;
    }

    footer {
      padding: 1rem 3rem;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer span, footer a { font-size: 0.7rem; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; text-decoration: none; }
    footer a:hover { color: var(--ink); }
    .nav-item { position: relative; display: flex; align-items: center; }
    .nav-dropdown { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: #fff7ed; border: 1px solid var(--rule); min-width: 160px; z-index: 200; padding: 0.5rem 0; padding-top: 0.75rem; margin-top: 0; }
    .nav-dropdown a { display: block; padding: 0.45rem 1rem; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); text-decoration: none; white-space: nowrap; transition: color 0.2s; }
    .nav-dropdown a:hover { color: var(--ink); }
    .nav-item:hover .nav-dropdown { display: block; }

    @media (max-width: 680px) {
      .site-name { display: none; }
      header { padding: 0 1.25rem; }
      nav { gap: 1rem; }
      nav a { font-size: 0.68rem; }
      .photo-wrap { padding: 1.5rem 0.5rem 3rem; }
      .photo-grid { columns: 2 140px; }
      .lightbox { padding: 0.25rem; }
      .lightbox-prev { left: 0; }
      .lightbox-next { right: 0; }
      footer { padding: 1rem 1.5rem; flex-direction: column; gap: 0.4rem; text-align: center; }
      .nav-dropdown { left: 0; transform: none; }
    }
</style>
</head>
<body>

  <header>
    <a href="/" class="site-name">A. M. Alcazar</a>
    <nav>
      <div class="nav-item"><a href="https://moviemarginalia.com">Writing</a><div class="nav-dropdown"><a href="https://moviemarginalia.substack.com" target="_blank">Movie Marginalia</a><a href="https://moviemarginalia.com/selected">Featured Reviews</a></div></div>
      <a href="/photography.html" class="active">Photography</a>
      <a href="/bio.html">Bio</a>
      <a href="/cv.html">CV</a>
      <a href="mailto:hello@amalcazar.com">Contact</a>
    </nav>
  </header>

  <div class="photo-wrap">
    <div class="photo-grid" id="photo-grid"></div>
    <div class="empty-state" id="empty-state" style="display:none;">No photos yet.</div>
    <p class="photo-footnote">Digital pictures taken on iPhone 15 Pro. Scans from Olympus OM-10.</p>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox()">&#215;</button>
    <button class="lightbox-prev" onclick="shiftLightbox(-1, event)">&#8249;</button>
    <button class="lightbox-next" onclick="shiftLightbox(1, event)">&#8250;</button>
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lightbox-img" src="" alt="">
      <div class="lightbox-info" id="lightbox-info"></div>
    </div>
  </div>

  <footer>
    <span>© A. M. Alcazar</span>
    <span>2026</span>
  </footer>

  <script>
    let photos = [];
    let current = 0;

    fetch('/photos.json')
      .then(r => r.json())
      .then(data => {
        for (let i = data.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [data[i], data[j]] = [data[j], data[i]];
        }
        photos = data;
        if (photos.length === 0) {
          document.getElementById('empty-state').style.display = 'block';
          return;
        }
        const grid = document.getElementById('photo-grid');
        photos.forEach((photo, i) => {
          const item = document.createElement('div');
          item.className = 'photo-item';
          item.onclick = () => openLightbox(i);

          const img = document.createElement('img');
          img.src = '/photos/' + photo.file;
          img.alt = photo.description || '';
          img.loading = 'lazy';
          item.appendChild(img);

          if (photo.description) {
            const hover = document.createElement('div');
            hover.className = 'photo-hover';
            hover.textContent = photo.description;
            item.appendChild(hover);
          }

          grid.appendChild(item);
        });
      })
      .catch(() => {
        document.getElementById('empty-state').style.display = 'block';
      });

    function openLightbox(index) {
      current = index;
      updateLightbox();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox(e) {
      if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function shiftLightbox(dir, e) {
      if (e) e.stopPropagation();
      current = (current + dir + photos.length) % photos.length;
      updateLightbox();
    }

    function updateLightbox() {
      const photo = photos[current];
      const img = document.getElementById('lightbox-img');
      img.src = '/photos/' + photo.file;
      img.alt = photo.description || '';

      const info = document.getElementById('lightbox-info');
      info.innerHTML = '';
      if (photo.description) {
        const d = document.createElement('p');
        d.className = 'lb-description';
        d.textContent = photo.description;
        info.appendChild(d);
      }
      if (photo.notes) {
        const n = document.createElement('p');
        n.className = 'lb-notes';
        n.textContent = photo.notes;
        info.appendChild(n);
      }
    }

    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'ArrowLeft') shiftLightbox(-1);
      if (e.key === 'ArrowRight') shiftLightbox(1);
      if (e.key === 'Escape') { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; }
    });

    // Swipe support
    let touchStartX = 0;
    document.getElementById('lightbox').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    document.getElementById('lightbox').addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) shiftLightbox(diff > 0 ? 1 : -1);
    }, { passive: true });
  </script>

</body>
</html>
