name: Build photos index

on:
  push:
    branches: [main]
    paths:
      - 'photos/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python3 scripts/build_photos.py
      - name: Commit updated photos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add photos.json
          git diff --cached --quiet || git commit -m "Auto-update photos.json" && git push
